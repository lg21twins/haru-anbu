<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>하루안부 — 로그인</title>
  <link rel="stylesheet" href="../common.css">
  <style>
    body {
      max-width: 430px; padding-top:72px;
      margin: 0 auto;
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }
    .login-top {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 var(--space-lg);
      gap: 12px;
    }
    .login-icon {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #0891B2, #58D0AC);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 40px;
      box-shadow: 0 8px 24px rgba(78,120,235,0.25);
      margin-bottom: 8px;
    }
    .login-title {
      font-size: var(--text-display);
      font-weight: var(--weight-bold);
      text-align: center;
      letter-spacing: -0.5px;
    }
    .login-desc {
      font-size: var(--text-callout);
      color: var(--text-secondary);
      text-align: center;
      line-height: var(--line-height-relaxed);
    }
    .login-bottom {
      padding: 0 var(--space-xl) 48px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      height: 52px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      font-family: var(--font-family);
      border: none;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
      text-decoration: none;
    }
    .social-btn:active {
      transform: scale(0.97);
      opacity: 0.85;
    }
    .btn-kakao {
      background: #FEE500;
      color: #191919;
    }
    .btn-kakao svg { width: 20px; height: 20px; }
    .btn-google {
      background: white;
      color: #1C1C1E;
      border: 1px solid var(--divider);
    }
    .btn-google svg { width: 20px; height: 20px; }
    .login-terms {
      font-size: 11px;
      color: var(--text-tertiary);
      text-align: center;
      margin-top: 4px;
      line-height: 1.5;
    }
    .login-terms a {
      color: var(--text-secondary);
      text-decoration: underline;
    }
  </style>
</head>
<body>  <div class="login-top">
    <div class="login-icon" style="background:none; box-shadow:none;">
      <svg width="60" height="60" viewBox="0 0 2526 2526" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2521.32 2506.66C1239.65 2657.48 1239.65 1895.6 1239.65 1279.34L2497.69 0.000170058C2518.68 494.198 2522.27 1157.92 1658.86 1262.48C2641.88 1314.25 2521.32 2101.84 2521.32 2506.66Z" fill="#0891B2"/>
        <path d="M4.6772 19.3353C1286.35 -131.481 1286.35 630.399 1286.35 1246.66L28.3145 2526C7.32194 2031.8 3.73014 1368.08 867.143 1263.52C-115.881 1211.75 4.6772 424.157 4.6772 19.3353Z" fill="#0891B2"/>
      </svg>
    </div>
    <h1 class="login-title">하루안부</h1>
    <p class="login-desc">요양시설 환자, 보호자, 의료진을 위한<br>AI 케어 커뮤니케이션 플랫폼</p>
  </div>

  <div class="login-bottom">
    <a href="ob03-role.html" class="social-btn btn-kakao">
      <svg viewBox="0 0 24 24" fill="#191919"><path d="M12 3C6.48 3 2 6.58 2 10.94c0 2.8 1.86 5.27 4.66 6.67-.15.56-.96 3.6-.99 3.83 0 0-.02.17.09.23.11.07.24.01.24.01.31-.04 3.65-2.4 4.22-2.81.58.08 1.17.13 1.78.13 5.52 0 10-3.58 10-7.94S17.52 3 12 3z"/></svg>
      카카오로 시작하기
    </a>
    <a href="ob03-role.html" class="social-btn btn-google">
      <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Google로 시작하기
    </a>
    <p class="login-terms">로그인 시 <a href="#">이용약관</a> 및 <a href="#">개인정보 처리방침</a>에 동의합니다.</p>
  </div>
<div class="ios-home-indicator"></div>
</body>
</html>
