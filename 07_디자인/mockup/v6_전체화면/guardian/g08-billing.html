<!DOCTYPE html>
<html lang="ko" data-role="guardian">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>하루안부 — 결제 / 청구</title>
  <link rel="stylesheet" href="../common.css">
  <style>
    body { background:transparent; max-width:430px; padding-top:72px; margin:0 auto; min-height:100vh; padding-bottom:calc(max(env(safe-area-inset-bottom, 0px), 20px) + 12px + 61px + 16px); }
    .content { padding:0 var(--space-lg); position: relative; z-index: 1; }

    .total-card {
      background: var(--bg);
      border-radius: var(--radius-xl);
      padding: var(--space-2xl);
      box-shadow: var(--shadow-md);
      text-align: center;
      margin-top: var(--space-lg);
    }
    .total-label {
      font-size: var(--text-callout);
      color: var(--text-secondary);
      margin-bottom: var(--space-sm);
    }
    .total-amount {
      font-size: 36px;
      font-weight: var(--weight-bold);
      color: var(--text-primary);
      margin-bottom: var(--space-xs);
    }
    .total-period {
      font-size: var(--text-caption);
      color: var(--text-secondary);
    }
    .total-status {
      display: inline-flex; align-items: center; gap: var(--space-xs);
      margin-top: var(--space-md);
      padding: 6px var(--space-md);
      background: #FFF3E0;
      color: #E65100;
      border-radius: var(--radius-full);
      font-size: var(--text-caption);
      font-weight: var(--weight-semibold);
    }

    .breakdown-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: var(--space-xl);
      box-shadow: var(--shadow-sm);
    }
    .breakdown-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-md) 0;
      font-size: var(--text-callout);
    }
    .breakdown-row + .breakdown-row {
      border-top: 1px solid var(--divider);
    }
    .breakdown-label { color: var(--text-secondary); }
    .breakdown-value { font-weight: var(--weight-semibold); }
    .breakdown-total {
      font-size: var(--text-headline);
      font-weight: var(--weight-bold);
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      padding: var(--space-md) var(--space-lg);
      background: var(--surface);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      margin-bottom: var(--space-sm);
    }
    .history-icon {
      width: 40px; height: 40px;
      border-radius: var(--radius-md);
      background: var(--primary-light);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .history-info { flex: 1; }
    .history-label { font-size: var(--text-callout); font-weight: var(--weight-medium); }
    .history-date { font-size: var(--text-mini); color: var(--text-secondary); margin-top: 1px; }
    .history-amount {
      font-size: var(--text-callout);
      font-weight: var(--weight-bold);
      flex-shrink: 0;
    }

    /* ═══ 홈화면 통일 디자인 ═══ */
    html { background: #EEF5FF; }
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: -1;
      background:
        radial-gradient(ellipse 68% 44% at  -4%   0%,  rgba(100,178,255,0.55)  0%, transparent 62%),
        radial-gradient(ellipse 58% 38% at 104%   0%,  rgba(56,189,248,0.48)   0%, transparent 60%),
        radial-gradient(ellipse 62% 44% at 106% 100%,  rgba(99,102,241,0.42)   0%, transparent 62%),
        radial-gradient(ellipse 58% 38% at  -4% 100%,  rgba(44,122,252,0.38)   0%, transparent 60%),
        radial-gradient(ellipse 42% 32% at  50%  50%,  rgba(255,255,255,0.58)  0%, transparent 65%),
        #E4EEFC;
      pointer-events: none;
    }
    /* 글라스 헤더 */
    .header {
      position: fixed !important; top: 0 !important;
      left: 50% !important; transform: translateX(-50%) !important;
      width: 100% !important; max-width: 430px !important;
      z-index: 10 !important; height: 60px !important;
      background: rgba(255,255,255,0.12) !important;
      backdrop-filter: blur(72px) saturate(190%) brightness(1.08) !important;
      -webkit-backdrop-filter: blur(72px) saturate(190%) brightness(1.08) !important;
      border-bottom: 0.5px solid rgba(255,255,255,0.55) !important;
      box-shadow: 0 1px 0 rgba(255,255,255,0.65) inset, 0 2px 12px rgba(0,0,0,0.04) !important;
    }
    /* 플로팅 필 탭바 */
    .tabbar {
      bottom: calc(max(env(safe-area-inset-bottom, 0px), 20px) + 12px) !important;
      width: calc(100% - 32px) !important; max-width: 398px !important;
      height: 61px !important; padding: 0 2px !important; padding-bottom: 0 !important;
      border-top: none !important; border-radius: 999px !important;
      background: rgba(255,255,255,0.07) !important;
      backdrop-filter: blur(72px) saturate(190%) brightness(1.10) !important;
      -webkit-backdrop-filter: blur(72px) saturate(190%) brightness(1.10) !important;
      border: 0.5px solid rgba(255,255,255,0.55) !important;
      box-shadow: 0 1px 1px rgba(255,255,255,0.6) inset, 0 -0.5px 0.5px rgba(255,255,255,0.25) inset, 0 4px 16px rgba(0,0,0,0.08) !important;
      align-items: stretch !important; right: auto !important; gap: 0 !important; z-index: 40 !important;
    }
    .tab {
      flex-direction: column !important; gap: 2px !important;
      padding: 8px 4px !important; border-radius: 999px !important;
      font-size: 0.65rem !important; font-weight: 500 !important;
      color: rgba(28,28,30,0.45) !important;
    }
    .tab.active { background: rgba(255,255,255,0.22) !important; color: #1C1C1E !important; }
    /* 글라스 카드 */
    .total-card, .breakdown-card, .history-item {
      background: rgba(255,255,255,0.14) !important;
      backdrop-filter: blur(56px) saturate(180%) brightness(1.06) !important;
      -webkit-backdrop-filter: blur(56px) saturate(180%) brightness(1.06) !important;
      border: 0.5px solid rgba(255,255,255,0.55) !important;
      box-shadow: 0 1px 0 rgba(255,255,255,0.65) inset, 0 4px 20px rgba(0,0,0,0.05) !important;
    }
    .breakdown-row + .breakdown-row { border-top: 0.5px solid rgba(255,255,255,0.28) !important; }
  </style>
</head>
<body>  <div class="header">
    <div class="header-left"><a href="g05-mypage.html" class="btn-icon" aria-label="뒤로 가기">‹</a></div>
    <span class="header-title">결제 / 청구</span>
    <div class="header-right"></div>
  </div>

  <div class="content">

    <!-- 이번 달 총액 -->
    <div class="section">
      <div class="total-card">
        <div class="total-label">이번 달 청구 금액</div>
        <div class="total-amount">1,200,000원</div>
        <div class="total-period">2026년 4월 1일 ~ 4월 30일</div>
        <span class="total-status"><i data-lucide="clock" style="width:14px;height:14px;"></i> 납부 예정</span>
      </div>
    </div>

    <!-- 상세 내역 -->
    <div class="section">
      <div class="section-header"><h2 class="section-title">청구 내역</h2></div>
      <div class="breakdown-card">
        <div class="breakdown-row">
          <span class="breakdown-label">요양 서비스 이용료</span>
          <span class="breakdown-value">800,000원</span>
        </div>
        <div class="breakdown-row">
          <span class="breakdown-label">식비</span>
          <span class="breakdown-value">180,000원</span>
        </div>
        <div class="breakdown-row">
          <span class="breakdown-label">간병비</span>
          <span class="breakdown-value">150,000원</span>
        </div>
        <div class="breakdown-row">
          <span class="breakdown-label">기타 (약품비 등)</span>
          <span class="breakdown-value">70,000원</span>
        </div>
        <div class="breakdown-row" style="border-top:2px solid var(--text-primary);">
          <span class="breakdown-total">합계</span>
          <span class="breakdown-total">1,200,000원</span>
        </div>
      </div>
    </div>

    <!-- 납부 이력 -->
    <div class="section">
      <div class="section-header"><h2 class="section-title">납부 이력</h2></div>
      <div class="history-item">
        <div class="history-icon"><i data-lucide="check-circle" style="width:20px;height:20px;color:var(--success)"></i></div>
        <div class="history-info">
          <div class="history-label">3월 청구</div>
          <div class="history-date">2026.03.28 납부 완료</div>
        </div>
        <span class="history-amount">1,150,000원</span>
      </div>
      <div class="history-item">
        <div class="history-icon"><i data-lucide="check-circle" style="width:20px;height:20px;color:var(--success)"></i></div>
        <div class="history-info">
          <div class="history-label">2월 청구</div>
          <div class="history-date">2026.02.27 납부 완료</div>
        </div>
        <span class="history-amount">1,150,000원</span>
      </div>
      <div class="history-item">
        <div class="history-icon"><i data-lucide="check-circle" style="width:20px;height:20px;color:var(--success)"></i></div>
        <div class="history-info">
          <div class="history-label">1월 청구</div>
          <div class="history-date">2026.01.28 납부 완료</div>
        </div>
        <span class="history-amount">1,180,000원</span>
      </div>
    </div>
  </div>
