<!DOCTYPE html>
<html lang="ko" data-role="guardian">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>하루안부 — 채팅</title>
  <link rel="stylesheet" href="../common.css">
  <style>
    /* ═══ BASE ═══ */
    html { background: #EEF5FF; }
    body {
      background: transparent;
      max-width: 430px; margin: 0 auto; min-height: 100vh;
      padding-top: calc(max(env(safe-area-inset-top, 0px), 44px) + 52px);
      padding-bottom: calc(max(env(safe-area-inset-bottom, 0px), 20px) + 12px + 68px + 16px);
    }
    body::after {
      content: ''; position: fixed; inset: 0; z-index: -1;
      background:
        radial-gradient(ellipse 68% 44% at  -4%   0%, rgba(100,178,255,0.55) 0%, transparent 62%),
        radial-gradient(ellipse 58% 38% at 104%   0%, rgba(56,189,248,0.48)  0%, transparent 60%),
        radial-gradient(ellipse 62% 44% at 106% 100%, rgba(99,102,241,0.42)  0%, transparent 62%),
        radial-gradient(ellipse 58% 38% at  -4% 100%, rgba(44,122,252,0.38)  0%, transparent 60%),
        radial-gradient(ellipse 42% 32% at  50%  50%, rgba(255,255,255,0.58) 0%, transparent 65%), #E4EEFC;
      pointer-events: none;
    }

    /* ═══ HEADER ═══ */
    .sticky-header {
      position: fixed; top: 0;
      left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px; z-index: 10;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(32px) saturate(120%) brightness(1.10);
      -webkit-backdrop-filter: blur(32px) saturate(120%) brightness(1.10);
      border-bottom: 0.5px solid rgba(255,255,255,0.18);
      padding-top: max(env(safe-area-inset-top, 0px), 44px);
      padding-bottom: 12px;
      padding-left: 16px; padding-right: 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-title { font-size: 1.05rem; font-weight: 700; color: #1C1C1E; }
    .btn-icon {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: 999px;
      background: rgba(255,255,255,0.10);
      backdrop-filter: blur(72px) saturate(190%) brightness(1.10);
      -webkit-backdrop-filter: blur(72px) saturate(190%) brightness(1.10);
      border: 0.5px solid rgba(255,255,255,0.55);
      box-shadow: 0 1px 1px rgba(255,255,255,0.6) inset, 0 4px 12px rgba(0,0,0,0.05);
      color: rgba(28,28,30,0.7); cursor: pointer; transition: transform 0.18s;
    }
    .btn-icon:active { transform: scale(0.94); }

    /* ═══ CONTENT ═══ */
    .content { padding: 0 16px; }

    /* ═══ SECTION HEADER ═══ */
    .section-label {
      font-size: 0.70rem; font-weight: 600; color: rgba(28,28,30,0.40);
      letter-spacing: 0.06em; text-transform: uppercase;
      padding: 20px 4px 8px;
    }

    /* ═══ CHAT LIST ═══ */
    .chat-list {
      display: flex; flex-direction: column; gap: 0;
      background: rgba(255,255,255,0.26);
      backdrop-filter: blur(56px) saturate(180%) brightness(1.06);
      -webkit-backdrop-filter: blur(56px) saturate(180%) brightness(1.06);
      border: 0.5px solid rgba(255,255,255,0.70);
      box-shadow: 0 1px 0 rgba(255,255,255,0.80) inset, 0 6px 20px rgba(0,0,0,0.09), 0 2px 6px rgba(0,0,0,0.05);
      border-radius: 20px;
      overflow: hidden;
      position: relative;
    }
    .chat-list::before {
      content: ''; position: absolute; inset: 0; border-radius: inherit;
      background: linear-gradient(135deg, rgba(255,255,255,0.22) 0%, transparent 55%);
      pointer-events: none; z-index: 0;
    }

    .chat-row {
      display: flex; align-items: center; gap: 13px;
      padding: 14px 16px;
      position: relative; z-index: 1;
      cursor: pointer; transition: background 0.15s;
      text-decoration: none; color: inherit;
    }
    .chat-row:not(:last-child)::after {
      content: ''; position: absolute;
      bottom: 0; left: 73px; right: 0;
      height: 0.5px; background: rgba(0,0,0,0.06);
    }
    .chat-row:active { background: rgba(255,255,255,0.18); }

    /* 아바타 */
    .chat-avatar {
      width: 48px; height: 48px; border-radius: 999px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; font-weight: 700; color: white;
      position: relative;
    }
    .chat-avatar-online::after {
      content: ''; position: absolute; bottom: 1px; right: 1px;
      width: 11px; height: 11px; border-radius: 999px;
      background: #34D399; border: 2px solid rgba(255,255,255,0.9);
    }

    /* 텍스트 */
    .chat-info { flex: 1; min-width: 0; }
    .chat-name-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 3px;
    }
    .chat-name { font-size: 0.90rem; font-weight: 600; color: #1C1C1E; }
    .chat-time { font-size: 0.68rem; color: rgba(28,28,30,0.40); flex-shrink: 0; }
    .chat-role { font-size: 0.72rem; color: rgba(28,28,30,0.45); margin-bottom: 4px; }
    .chat-preview-row {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .chat-preview {
      font-size: 0.78rem; color: rgba(28,28,30,0.50);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      flex: 1;
    }
    .chat-preview.unread { color: rgba(28,28,30,0.75); font-weight: 500; }
    .unread-badge {
      min-width: 18px; height: 18px; border-radius: 999px;
      background: var(--primary); color: white;
      font-size: 0.65rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      padding: 0 5px; flex-shrink: 0;
    }

    /* ═══ AI 채널 카드 ═══ */
    .ai-channel {
      display: flex; align-items: center; gap: 13px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.26);
      backdrop-filter: blur(56px) saturate(180%) brightness(1.06);
      -webkit-backdrop-filter: blur(56px) saturate(180%) brightness(1.06);
      border: 0.5px solid rgba(255,255,255,0.70);
      box-shadow: 0 1px 0 rgba(255,255,255,0.80) inset, 0 6px 20px rgba(0,0,0,0.09), 0 2px 6px rgba(0,0,0,0.05);
      border-radius: 20px;
      cursor: pointer; text-decoration: none; color: inherit;
      position: relative; overflow: hidden; transition: background 0.15s;
    }
    .ai-channel::before {
      content: ''; position: absolute; inset: 0; border-radius: inherit;
      background: linear-gradient(135deg, rgba(255,255,255,0.22) 0%, transparent 55%);
      pointer-events: none; z-index: 0;
    }
    .ai-channel > * { position: relative; z-index: 1; }
    .ai-channel:active { background: rgba(255,255,255,0.38); }
    .ai-avatar {
      width: 48px; height: 48px; border-radius: 999px; flex-shrink: 0;
      background: linear-gradient(135deg, #2C7AFC 0%, #7C3AED 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .ai-channel-info { flex: 1; min-width: 0; }
    .ai-channel-name { font-size: 0.90rem; font-weight: 600; color: #1C1C1E; margin-bottom: 2px; }
    .ai-channel-desc { font-size: 0.75rem; color: rgba(28,28,30,0.50); }
    .ai-channel-badge {
      padding: 3px 8px; border-radius: 999px;
      background: rgba(44,122,252,0.12); color: var(--primary);
      font-size: 0.65rem; font-weight: 700; flex-shrink: 0;
    }

    /* ═══ TABBAR ═══ */
    .tabbar {
      position: fixed !important;
      bottom: calc(max(env(safe-area-inset-bottom, 0px), 20px) + 12px) !important;
      left: 50% !important; transform: translateX(-50%) !important;
      width: calc(100% - 32px) !important; max-width: 398px !important;
      height: 68px !important; padding: 0 2px !important;
      border-top: none !important; border-radius: 999px !important;
      background: rgba(255,255,255,0.07) !important;
      backdrop-filter: blur(72px) saturate(190%) brightness(1.10) !important;
      -webkit-backdrop-filter: blur(72px) saturate(190%) brightness(1.10) !important;
      border: 0.5px solid rgba(255,255,255,0.55) !important;
      box-shadow: 0 1px 1px rgba(255,255,255,0.6) inset, 0 -0.5px 0.5px rgba(255,255,255,0.25) inset, 0 4px 16px rgba(0,0,0,0.08) !important;
      display: flex !important; align-items: stretch !important;
      right: auto !important; gap: 0 !important; z-index: 40 !important;
    }
    .tab {
      display: flex !important; flex-direction: column !important;
      align-items: center !important; justify-content: center !important;
      gap: 2px !important; flex: 1 !important;
      padding: 8px 4px !important; border-radius: 999px !important;
      font-size: 0.75rem !important; font-weight: 500 !important;
      color: rgba(28,28,30,0.45) !important;
      text-decoration: none !important; transition: all 0.18s !important;
      white-space: nowrap !important;
    }
    .tab.active { background: rgba(255,255,255,0.22) !important; color: #1C1C1E !important; }
    .tab-icon { display: flex; align-items: center; }
  </style>
</head>
