<!DOCTYPE html>
<html lang="ko" data-role="guardian">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>하루안부 — 내 정보</title>
  <link rel="stylesheet" href="../common.css">
  <style>
    body {
      background: var(--bg);
      max-width: 430px; padding-top:72px;
      margin: 0 auto;
      min-height: 100vh;
      padding-bottom: 108px;
    }
    .content { padding: 0 var(--space-lg); }

    /* --- 프로필 + 케어 대상 통합 카드 --- */
    .profile-card {
      background: linear-gradient(135deg, var(--primary), color-mix(in srgb, var(--primary) 70%, #065F6B));
      border-radius: var(--radius-xl);
      padding: var(--space-2xl) var(--space-xl);
      color: white;
      margin-top: var(--space-xl);
      margin-bottom: var(--space-2xl);
      box-shadow: 0 8px 24px rgba(8, 145, 178, 0.3);
      position: relative;
      overflow: hidden;
    }
    .profile-card::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 120px; height: 120px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
    }
    .profile-card::after {
      content: '';
      position: absolute;
      bottom: -20px; left: -20px;
      width: 80px; height: 80px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
    }
    .profile-top {
      display: flex;
      align-items: center;
      gap: var(--space-lg);
      margin-bottom: var(--space-xl);
      position: relative;
      z-index: 1;
    }
    .profile-avatar {
      width: 60px; height: 60px;
      border-radius: var(--radius-full);
      background: rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      backdrop-filter: blur(8px);
    }
    .profile-name {
      font-size: var(--text-title);
      font-weight: var(--weight-bold);
      margin-bottom: 2px;
    }
    .profile-role {
      font-size: var(--text-caption);
      opacity: 0.8;
    }

    /* 케어 대상 정보 (카드 내부) */
    .care-strip {
      display: flex;
      gap: var(--space-sm);
      position: relative;
      z-index: 1;
    }
    .care-chip {
      flex: 1;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      text-align: center;
    }
    .care-chip-value {
      font-size: var(--text-headline);
      font-weight: var(--weight-bold);
      margin-bottom: 2px;
    }
    .care-chip-label {
      font-size: var(--text-mini);
      opacity: 0.7;
    }

    /* --- 케어 대상 상세 카드 --- */
    .care-detail {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: var(--space-xl);
      box-shadow: var(--shadow-md);
      margin-bottom: var(--space-2xl);
    }
    .care-detail-header {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      margin-bottom: var(--space-lg);
      padding-bottom: var(--space-md);
      border-bottom: 1px solid var(--divider);
    }
    .care-detail-avatar {
      width: 48px; height: 48px;
      border-radius: var(--radius-full);
      background: var(--primary-light);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .care-detail-name {
      font-size: var(--text-headline);
      font-weight: var(--weight-semibold);
    }
    .care-detail-sub {
      font-size: var(--text-caption);
      color: var(--text-secondary);
      margin-top: 1px;
    }
    .care-detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-md);
    }
    .care-detail-item {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }
    .care-detail-icon {
      width: 32px; height: 32px;
      border-radius: var(--radius-sm);
      background: var(--primary-light);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .care-detail-text {}
    .care-detail-label {
      font-size: var(--text-mini);
      color: var(--text-secondary);
    }
    .care-detail-value {
      font-size: var(--text-callout);
      font-weight: var(--weight-semibold);
    }

    /* --- 메뉴 --- */
    .menu-group {
      background: var(--surface);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      margin-bottom: var(--space-xl);
    }
    .menu-group-title {
      font-size: var(--text-caption);
      font-weight: var(--weight-semibold);
      color: var(--text-secondary);
      padding: var(--space-sm) var(--space-xs);
    }
    .menu-item {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      padding: var(--space-md) var(--space-lg);
      min-height: var(--row-height);
    }
    .menu-item + .menu-item {
      border-top: 0.5px solid var(--divider);
    }
    .menu-item-icon {
      width: 36px; height: 36px;
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .menu-item-icon--blue,
    .menu-item-icon--green,
    .menu-item-icon--orange,
    .menu-item-icon--purple { background: var(--primary-light); color: var(--primary); }
    .menu-item-text { flex: 1; }
    .menu-item-label {
      font-size: var(--text-headline);
    }
    .menu-item-desc {
      font-size: var(--text-mini);
      color: var(--text-secondary);
      margin-top: 1px;
    }
    .menu-item-chevron {
      color: var(--text-tertiary);
    }

    .logout-btn {
      display: block;
      width: 100%;
      padding: var(--space-md);
      text-align: center;
      font-size: var(--text-callout);
      color: var(--critical);
      background: var(--surface);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      margin-bottom: var(--space-xl);
    }
  </style>
</head>

    <!-- 메뉴: 계정 -->

      <div class="menu-item">

        <div class="menu-item-text">
