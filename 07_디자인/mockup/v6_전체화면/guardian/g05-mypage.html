<!DOCTYPE html>
<html lang="ko" data-role="guardian">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>하루안부 — 내 정보</title>
  <link rel="stylesheet" href="../common.css">
  <style>
    body {
      background: transparent;
      max-width: 430px; padding-top:72px;
      margin: 0 auto;
      min-height: 100vh;
      padding-bottom: calc(max(env(safe-area-inset-bottom, 0px), 20px) + 12px + 61px + 16px);
    }
    .content { padding: 0 var(--space-lg); position: relative; z-index: 1; }

    /* --- 프로필 + 케어 대상 통합 카드 --- */
    .profile-card {
      background: linear-gradient(135deg, var(--primary), color-mix(in srgb, var(--primary) 70%, #065F6B));
      border-radius: var(--radius-xl);
      padding: var(--space-2xl) var(--space-xl);
      color: white;
      margin-top: var(--space-xl);
      margin-bottom: var(--space-2xl);
      box-shadow: 0 8px 24px rgba(8, 145, 178, 0.3);
      position: relative;
      overflow: hidden;
    }
    .profile-card::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 120px; height: 120px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
    }
    .profile-card::after {
      content: '';
      position: absolute;
      bottom: -20px; left: -20px;
      width: 80px; height: 80px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
    }
    .profile-top {
      display: flex;
      align-items: center;
      gap: var(--space-lg);
      margin-bottom: var(--space-xl);
      position: relative;
      z-index: 1;
    }
    .profile-avatar {
      width: 60px; height: 60px;
      border-radius: var(--radius-full);
      background: rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      backdrop-filter: blur(8px);
    }
    .profile-name {
      font-size: var(--text-title);
      font-weight: var(--weight-bold);
      margin-bottom: 2px;
    }
    .profile-role {
      font-size: var(--text-caption);
      opacity: 0.8;
    }

    /* 케어 대상 정보 (카드 내부) */
    .care-strip {
      display: flex;
      gap: var(--space-sm);
      position: relative;
      z-index: 1;
    }
    .care-chip {
      flex: 1;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      text-align: center;
    }
    .care-chip-value {
      font-size: var(--text-headline);
      font-weight: var(--weight-bold);
      margin-bottom: 2px;
    }
    .care-chip-label {
      font-size: var(--text-mini);
      opacity: 0.7;
    }

    /* --- 케어 대상 상세 카드 --- */
    .care-detail {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: var(--space-xl);
      box-shadow: var(--shadow-md);
      margin-bottom: var(--space-2xl);
    }
    .care-detail-header {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      margin-bottom: var(--space-lg);
      padding-bottom: var(--space-md);
      border-bottom: 1px solid var(--divider);
    }
    .care-detail-avatar {
      width: 48px; height: 48px;
      border-radius: var(--radius-full);
      background: var(--primary-light);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .care-detail-name {
      font-size: var(--text-headline);
      font-weight: var(--weight-semibold);
    }
    .care-detail-sub {
      font-size: var(--text-caption);
      color: var(--text-secondary);
      margin-top: 1px;
    }
    .care-detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-md);
    }
    .care-detail-item {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }
    .care-detail-icon {
      width: 32px; height: 32px;
      border-radius: var(--radius-sm);
      background: var(--primary-light);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .care-detail-text {}
    .care-detail-label {
      font-size: var(--text-mini);
      color: var(--text-secondary);
    }
    .care-detail-value {
      font-size: var(--text-callout);
      font-weight: var(--weight-semibold);
    }

    /* --- 메뉴 --- */
    .menu-group {
      background: var(--surface);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      margin-bottom: var(--space-xl);
    }
    .menu-group-title {
      font-size: var(--text-caption);
      font-weight: var(--weight-semibold);
      color: var(--text-secondary);
      padding: var(--space-sm) var(--space-xs);
    }
    .menu-item {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      padding: var(--space-md) var(--space-lg);
      min-height: var(--row-height);
    }
    .menu-item + .menu-item {
      border-top: 0.5px solid var(--divider);
    }
    .menu-item-icon {
      width: 36px; height: 36px;
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .menu-item-icon--blue,
    .menu-item-icon--green,
    .menu-item-icon--orange,
    .menu-item-icon--purple { background: var(--primary-light); color: var(--primary); }
    .menu-item-text { flex: 1; }
    .menu-item-label {
      font-size: var(--text-headline);
    }
    .menu-item-desc {
      font-size: var(--text-mini);
      color: var(--text-secondary);
      margin-top: 1px;
    }
    .menu-item-chevron {
      color: var(--text-tertiary);
    }

    .logout-btn {
      display: block;
      width: 100%;
      padding: var(--space-md);
      text-align: center;
      font-size: var(--text-callout);
      color: var(--critical);
      background: var(--surface);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      margin-bottom: var(--space-xl);
    }

    /* ═══ 홈화면 통일 디자인 ═══ */
    html { background: #EEF5FF; }
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: -1;
      background:
        radial-gradient(ellipse 68% 44% at  -4%   0%,  rgba(100,178,255,0.55)  0%, transparent 62%),
        radial-gradient(ellipse 58% 38% at 104%   0%,  rgba(56,189,248,0.48)   0%, transparent 60%),
        radial-gradient(ellipse 62% 44% at 106% 100%,  rgba(99,102,241,0.42)   0%, transparent 62%),
        radial-gradient(ellipse 58% 38% at  -4% 100%,  rgba(44,122,252,0.38)   0%, transparent 60%),
        radial-gradient(ellipse 42% 32% at  50%  50%,  rgba(255,255,255,0.58)  0%, transparent 65%),
        #E4EEFC;
      pointer-events: none;
    }
    /* 플로팅 필 탭바 */
    .tabbar {
      position: fixed !important;
      bottom: calc(max(env(safe-area-inset-bottom, 0px), 20px) + 12px) !important;
      left: 50% !important; transform: translateX(-50%) !important;
      width: calc(100% - 32px) !important; max-width: 398px !important;
      height: 61px !important; padding: 0 2px !important; padding-bottom: 0 !important;
      border-top: none !important; border-radius: 999px !important;
      background: rgba(255,255,255,0.07) !important;
      backdrop-filter: blur(72px) saturate(190%) brightness(1.10) !important;
      -webkit-backdrop-filter: blur(72px) saturate(190%) brightness(1.10) !important;
      border: 0.5px solid rgba(255,255,255,0.55) !important;
      box-shadow: 0 1px 1px rgba(255,255,255,0.6) inset, 0 -0.5px 0.5px rgba(255,255,255,0.25) inset, 0 4px 16px rgba(0,0,0,0.08) !important;
      align-items: stretch !important; right: auto !important; gap: 0 !important; z-index: 40 !important;
    }
    .tab {
      flex-direction: column !important; gap: 2px !important;
      padding: 8px 4px !important; border-radius: 999px !important;
      font-size: 0.65rem !important; font-weight: 500 !important;
      color: rgba(28,28,30,0.45) !important;
    }
    .tab.active { background: rgba(255,255,255,0.22) !important; color: #1C1C1E !important; }
    /* 글라스 카드 */
    .care-detail, .menu-group, .logout-btn {
      background: rgba(255,255,255,0.14) !important;
      backdrop-filter: blur(56px) saturate(180%) brightness(1.06) !important;
      -webkit-backdrop-filter: blur(56px) saturate(180%) brightness(1.06) !important;
      border: 0.5px solid rgba(255,255,255,0.55) !important;
      box-shadow: 0 1px 0 rgba(255,255,255,0.65) inset, 0 4px 20px rgba(0,0,0,0.05) !important;
    }
    .menu-item + .menu-item { border-top: 0.5px solid rgba(255,255,255,0.28) !important; }
    .care-detail-header { border-bottom: 0.5px solid rgba(255,255,255,0.28) !important; }
  </style>
</head>
