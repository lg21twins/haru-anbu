<!DOCTYPE html>
<html lang="ko" data-role="guardian">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>하루안부 — 채팅</title>
  <link rel="stylesheet" href="common.css">
  <style>
    body {
      background: transparent;
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      padding-top: calc(max(env(safe-area-inset-top, 0px), 44px) + 56px);
      padding-bottom: calc(max(env(safe-area-inset-bottom, 0px), 20px) + 12px + 68px + 16px);
    }

    /* ═══ 배경 ═══ */
    html { background: #EEF3FB; }
    /* 배경 애니메이션 블롭 */
    .bg{position:fixed;inset:0;z-index:0;overflow:hidden;background:linear-gradient(180deg,#d4e4ff 0%,#e8f0fe 40%,#f2f6ff 70%,#EEF3FB 100%);pointer-events:none}
    .bg-logo{position:absolute;width:140%;height:auto;left:50%;top:42%;transform:translate(-50%,-50%);opacity:.06;filter:blur(32px);animation:bgl 8s ease-in-out infinite}
    @keyframes bgl{0%,100%{transform:translate(-50%,-50%)scale(1);opacity:.05}50%{transform:translate(-50%,-50%)scale(1.06)rotate(1.5deg);opacity:.08}}
    .bg .g1{position:absolute;width:500px;height:500px;left:50%;top:-5%;transform:translateX(-50%);border-radius:50%;background:radial-gradient(circle,rgba(44,122,252,.18)0%,transparent 65%);filter:blur(30px);animation:ga 8s ease-in-out infinite alternate}
    .bg .g2{position:absolute;width:600px;height:400px;left:50%;top:35%;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(ellipse,rgba(200,220,255,.25)0%,transparent 65%);filter:blur(40px);animation:gb 10s ease-in-out infinite alternate}
    .bg .g3{position:absolute;width:700px;height:500px;left:50%;bottom:-15%;transform:translateX(-50%);border-radius:50%;background:radial-gradient(ellipse,rgba(44,122,252,.08)0%,transparent 70%);filter:blur(35px);animation:gc 12s ease-in-out infinite alternate}
    @keyframes ga{0%{transform:translateX(-50%)scale(1)}100%{transform:translateX(-48%)scale(1.08)translateY(12px)}}
    @keyframes gb{0%{transform:translate(-50%,-50%)scale(1)}100%{transform:translate(-52%,-48%)scale(1.05)}}
    @keyframes gc{0%{transform:translateX(-50%)scale(1)}100%{transform:translateX(-48%)scale(1.06)translateY(-8px)}}

    /* ═══ 헤더 ═══ */
    .chat-header {
      position: fixed;
      top: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px;
      background: transparent;
      padding-top: max(env(safe-area-inset-top, 0px), 44px);
      padding-left: var(--space-lg);
      padding-right: var(--space-lg);
      padding-bottom: var(--space-md);
      z-index: 10;
    }
    .chat-header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .chat-header-title {
      font-size: var(--text-title);
      font-weight: var(--weight-bold);
    }
    .header-edit-btn {
      width: 36px; height: 36px;
      border: none;
      border-radius: var(--radius-full);
      background: rgba(255,255,255,0.42);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 0.5px solid rgba(255,255,255,0.50);
      color: var(--primary);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset;
    }

    /* ═══ 전체 래퍼 ═══ */
    .chat-list-wrap {
      padding: var(--space-xs) var(--space-lg) 0;
    }

    .section-label {
      font-size: var(--text-caption);
      font-weight: var(--weight-semibold);
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: var(--space-md) 0 var(--space-xs);
    }


    /* ═══ 케어 현황 카드 ═══ */
    .care-status-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.42);
      backdrop-filter: blur(24px) saturate(140%);
      -webkit-backdrop-filter: blur(24px) saturate(140%);
      border: 0.5px solid rgba(255,255,255,0.60);
      border-radius: var(--radius-xl);
      box-shadow:
        0 1px 0 rgba(255,255,255,0.75) inset,
        0 4px 16px rgba(0,0,0,0.05);
      margin-bottom: var(--space-xs);
    }
    .care-status-icon {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3B82F6, #0EA5E9);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      position: relative;
    }
    .care-status-icon::after {
      content: '';
      position: absolute; bottom: 1px; right: 1px;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #34D399;
      border: 2px solid white;
    }
    .care-status-body { flex: 1; min-width: 0; }
    .care-status-name {
      font-size: var(--text-footnote);
      font-weight: var(--weight-semibold);
      color: var(--text-primary);
      margin-bottom: 2px;
    }
    .care-status-sub {
      font-size: var(--text-mini);
      color: var(--text-secondary);
    }
    .care-status-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      flex-shrink: 0;
    }
    .care-unread-badge {
      background: rgba(239,68,68,0.12);
      color: #EF4444;
      font-size: 11px;
      font-weight: 700;
      border-radius: 999px;
      padding: 2px 8px;
      white-space: nowrap;
    }
    .care-last-time {
      font-size: var(--text-mini);
      color: var(--text-tertiary);
    }

    /* ═══ 채팅 목록 ═══ */
    .chat-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }

    .chat-item {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      padding: 14px var(--space-lg);
      background: rgba(255,255,255,0.42);
      backdrop-filter: blur(24px) saturate(140%);
      -webkit-backdrop-filter: blur(24px) saturate(140%);
      border: 0.5px solid rgba(255,255,255,0.60);
      border-radius: var(--radius-xl);
      box-shadow:
        0 1px 0 rgba(255,255,255,0.75) inset,
        0 4px 16px rgba(0,0,0,0.05);
      text-decoration: none;
      color: inherit;
      transition: transform 0.15s ease, background 0.15s ease;
      position: relative;
    }
    .chat-item:active {
      transform: scale(0.97);
      background: rgba(255,255,255,0.32);
    }


    .chat-avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 20px;
      font-weight: 700;
      border: 0.5px solid rgba(255,255,255,0.5);
    }
    .avatar-nurse   { background: linear-gradient(135deg, #3B82F6, #0EA5E9); color: white; }
    .avatar-patient { background: linear-gradient(135deg, #F59E0B, #FBBF24); color: white; }
    .avatar-family  { background: linear-gradient(135deg, #10B981, #34D399); color: white; }
    .avatar-ai      { background: linear-gradient(135deg, #2C7AFC, #7C3AED); color: white; }

    .chat-item-body {
      flex: 1;
      min-width: 0;
    }
    .chat-item-name {
      font-size: var(--text-callout);
      font-weight: var(--weight-semibold);
      margin-bottom: 3px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .chat-item-name-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(44,122,252,0.15), rgba(124,58,237,0.15));
      color: #6D28D9;
    }
    .chat-item-preview {
      font-size: var(--text-footnote);
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-item-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 5px;
      flex-shrink: 0;
    }
    .chat-item-time {
      font-size: var(--text-mini);
      color: var(--text-tertiary);
    }
    .chat-item-badge {
      background: var(--primary);
      color: white;
      font-size: 11px;
      font-weight: 700;
      border-radius: 999px;
      padding: 2px 7px;
      min-width: 20px;
      text-align: center;
      line-height: 1.4;
    }
    .badge-hidden { visibility: hidden; }

    /* ═══ 플로팅 필 탭바 ═══ */
    html { background: #EEF3FB; }
  </style>
</head>
