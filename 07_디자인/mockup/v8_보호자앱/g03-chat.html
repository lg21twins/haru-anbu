<!DOCTYPE html>
<html lang="ko" data-role="guardian">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>하루안부 — 채팅</title>
  <link rel="stylesheet" href="common.css">
  <style>
    body {
      background: transparent;
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      padding-top: calc(max(env(safe-area-inset-top, 0px), 44px) + 56px);
      padding-bottom: calc(max(env(safe-area-inset-bottom, 0px), 20px) + 12px + 68px + 16px);
    }

    /* ═══ 배경 ═══ */
    html { background: #EEF5FF; }
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: -1;
      background:
        radial-gradient(ellipse 68% 44% at  -4%   0%,  rgba(100,178,255,0.55)  0%, transparent 62%),
        radial-gradient(ellipse 58% 38% at 104%   0%,  rgba(56,189,248,0.48)   0%, transparent 60%),
        radial-gradient(ellipse 62% 44% at 106% 100%,  rgba(99,102,241,0.42)   0%, transparent 62%),
        radial-gradient(ellipse 58% 38% at  -4% 100%,  rgba(44,122,252,0.38)   0%, transparent 60%),
        radial-gradient(ellipse 42% 32% at  50%  50%,  rgba(255,255,255,0.58)  0%, transparent 65%),
        #E4EEFC;
      pointer-events: none;
    }

    /* ═══ 헤더 ═══ */
    .chat-header {
      position: fixed;
      top: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px;
      background: transparent;
      padding-top: max(env(safe-area-inset-top, 0px), 44px);
      padding-left: var(--space-lg);
      padding-right: var(--space-lg);
      padding-bottom: var(--space-md);
      z-index: 10;
    }
    .chat-header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .chat-header-title {
      font-size: var(--text-title);
      font-weight: var(--weight-bold);
    }
    .header-edit-btn {
      width: 36px; height: 36px;
      border: none;
      border-radius: var(--radius-full);
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 0.5px solid rgba(255,255,255,0.50);
      color: var(--primary);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset;
    }

    /* ═══ 채팅 목록 ═══ */
    .chat-list-wrap {
      padding: var(--space-xs) var(--space-lg) 0;
    }

    .section-label {
      font-size: var(--text-caption);
      font-weight: var(--weight-semibold);
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: var(--space-md) 0 var(--space-xs);
    }

    .chat-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }

    .chat-item {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      padding: 14px var(--space-lg);
      background: rgba(255,255,255,0.22);
      backdrop-filter: blur(40px) saturate(160%);
      -webkit-backdrop-filter: blur(40px) saturate(160%);
      border: 0.5px solid rgba(255,255,255,0.60);
      border-radius: var(--radius-xl);
      box-shadow:
        0 1px 0 rgba(255,255,255,0.75) inset,
        0 4px 16px rgba(0,0,0,0.05);
      text-decoration: none;
      color: inherit;
      transition: transform 0.15s ease, background 0.15s ease;
      position: relative;
    }
    .chat-item:active {
      transform: scale(0.97);
      background: rgba(255,255,255,0.32);
    }

    .chat-avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 20px;
      font-weight: 700;
      border: 0.5px solid rgba(255,255,255,0.5);
    }
    .avatar-nurse  { background: linear-gradient(135deg, #3B82F6, #0EA5E9); color: white; }
    .avatar-patient { background: linear-gradient(135deg, #F59E0B, #FBBF24); color: white; }
    .avatar-family  { background: linear-gradient(135deg, #10B981, #34D399); color: white; }

    .chat-item-body {
      flex: 1;
      min-width: 0;
    }
    .chat-item-name {
      font-size: var(--text-callout);
      font-weight: var(--weight-semibold);
      margin-bottom: 3px;
    }
    .chat-item-preview {
      font-size: var(--text-footnote);
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-item-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 5px;
      flex-shrink: 0;
    }
    .chat-item-time {
      font-size: var(--text-mini);
      color: var(--text-tertiary);
    }
    .chat-item-badge {
      background: var(--primary);
      color: white;
      font-size: 11px;
      font-weight: 700;
      border-radius: 999px;
      padding: 2px 7px;
      min-width: 20px;
      text-align: center;
      line-height: 1.4;
    }
    .badge-hidden { visibility: hidden; }

    /* ═══ 플로팅 필 탭바 ═══ */
    .tabbar {
      position: fixed !important;
      bottom: calc(max(env(safe-area-inset-bottom, 0px), 20px) + 12px) !important;
      left: 50% !important; transform: translateX(-50%) !important;
      width: calc(100% - 32px) !important; max-width: 398px !important;
      height: 68px !important; padding: 0 2px !important;
      border-top: none !important; border-radius: 999px !important;
      background: rgba(255,255,255,0.07) !important;
      backdrop-filter: blur(72px) saturate(190%) brightness(1.10) !important;
      -webkit-backdrop-filter: blur(72px) saturate(190%) brightness(1.10) !important;
      border: 0.5px solid rgba(255,255,255,0.55) !important;
      box-shadow: 0 1px 1px rgba(255,255,255,0.6) inset, 0 -0.5px 0.5px rgba(255,255,255,0.25) inset, 0 4px 16px rgba(0,0,0,0.08) !important;
      align-items: stretch !important; right: auto !important; gap: 0 !important; z-index: 40 !important;
    }
    .tab {
      flex-direction: column !important; gap: 2px !important;
      padding: 8px 4px !important; border-radius: 999px !important;
      font-size: 0.75rem !important; font-weight: 500 !important;
      color: rgba(28,28,30,0.45) !important;
    }
    .tab.active { background: rgba(255,255,255,0.22) !important; color: #1C1C1E !important; }
  </style>
</head>
<body>

  <!-- Header -->

      <!-- 환자 채팅 -->
      <a href="g03-chat-patient.html" class="chat-item">

      <!-- 가족 그룹 채팅 -->

        </div>
        <div class="chat-item-meta">
          <span class="chat-item-time">어제</span>
          <span class="chat-item-badge">1</span>
        </div>
      </a>

    </div>
  </div>
