<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>다크모드 — 환자 홈</title>
  <link rel="stylesheet" href="../v6_전체화면/common.css">
  <style>
    body { background: #1C1C1E; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

    :root {
      --dk-bg: #0D0900;
      --dk-surface: #1A1208;
      --dk-surface2: #261B0C;
      --dk-surface3: #332410;
      --dk-divider: rgba(255,255,255,0.07);
      --dk-text1: #FFFFFF;
      --dk-text2: rgba(255,255,255,0.55);
      --dk-text3: rgba(255,255,255,0.3);
      --dk-primary: #FB923C;        /* orange-400 */
      --dk-primary-glow: rgba(251,146,60,0.18);
    }

    .phone {
      position: relative;
      width: 393px; height: 852px;
      background: var(--dk-bg);
      border-radius: 48px;
      overflow: hidden;
      box-shadow: 0 0 0 4px #000, 0 24px 64px rgba(0,0,0,0.6);
    }
    .phone::before {
      content: '';
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      width: 126px; height: 36px;
      background: #000; border-radius: 20px; z-index: 20;
    }

    .scroll {
      height: calc(852px - 84px);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 20px;
    }
    .scroll::-webkit-scrollbar { display: none; }

    .sbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 24px 0; height: 54px;
      font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.7);
      position: sticky; top: 0; z-index: 10;
      background: linear-gradient(180deg, var(--dk-bg) 60%, transparent);
    }
    .sbar-time { font-size: 15px; font-weight: 700; color: white; }
    .sbar-icons { display: flex; gap: 5px; }

    /* 히어로 */
    .hero {
      padding: 12px 24px 24px;
      position: relative; overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      bottom: -40px; right: -40px;
      width: 240px; height: 240px;
      background: radial-gradient(circle, rgba(251,146,60,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-greeting { font-size: 13px; color: var(--dk-text2); margin-bottom: 3px; font-weight: 500; }
    .hero-name {
      font-size: 26px; font-weight: 700; color: var(--dk-text1);
      margin-bottom: 20px; line-height: 1.2;
    }
    .hero-name span { color: var(--dk-primary); }

    /* 일과 카드 */
    .daily-card {
      background: var(--dk-surface);
      border-radius: 20px; padding: 20px;
      border: 1px solid var(--dk-divider);
      position: relative; overflow: hidden;
    }
    .daily-card::after {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(251,146,60,0.4), transparent);
    }

    .daily-top {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px;
    }
    .daily-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 10px;
      background: rgba(251,146,60,0.12);
      border-radius: 999px;
      font-size: 11px; font-weight: 600; color: var(--dk-primary);
    }
    .daily-date { font-size: 12px; color: var(--dk-text3); }

    .daily-center {
      display: flex; align-items: center; gap: 16px;
    }
    .ring-wrap {
      position: relative; width: 80px; height: 80px; flex-shrink: 0;
    }
    .ring-wrap svg { transform: rotate(-90deg); filter: drop-shadow(0 0 8px rgba(251,146,60,0.35)); }
    .ring-label {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .ring-main { font-size: 22px; font-weight: 800; color: var(--dk-primary); line-height: 1; }
    .ring-sub { font-size: 10px; color: var(--dk-text3); margin-top: 2px; }

    .daily-info { flex: 1; }
    .daily-title { font-size: 18px; font-weight: 700; color: var(--dk-text1); margin-bottom: 4px; }
    .daily-next { font-size: 13px; color: var(--dk-text2); }

    /* 컨텐츠 */
    .content { padding: 0 16px; }

    /* 투약 카드 */
    .med-card {
      background: var(--dk-surface);
      border: 1px solid rgba(251,146,60,0.15);
      border-radius: 18px; padding: 18px;
      margin-bottom: 16px;
    }
    .med-top {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px;
    }
    .med-icon {
      width: 40px; height: 40px; border-radius: 12px;
      background: rgba(251,146,60,0.12);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .med-title { font-size: 16px; font-weight: 700; color: var(--dk-text1); }
    .med-sub { font-size: 12px; color: var(--dk-text2); margin-top: 2px; }
    .med-progress-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px;
    }
    .med-progress-bar {
      flex: 1; height: 6px;
      background: var(--dk-surface3); border-radius: 999px; overflow: hidden;
    }
    .med-progress-fill {
      height: 100%; border-radius: 999px;
      background: linear-gradient(90deg, var(--dk-primary), #FDBA74);
      width: 33%;
    }
    .med-count { font-size: 13px; font-weight: 600; color: var(--dk-text2); }

    .med-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--dk-primary), #FDBA74);
      border-radius: 14px;
      font-size: 16px; font-weight: 700;
      color: white; text-align: center;
      box-shadow: 0 4px 16px rgba(251,146,60,0.3);
    }

    /* 메뉴 카드 그리드 */
    .menu-grid {
      display: flex; flex-direction: column; gap: 10px;
      margin-bottom: 16px;
    }
    .menu-card {
      display: flex; align-items: center; gap: 14px;
      background: var(--dk-surface);
      border: 1px solid var(--dk-divider);
      border-radius: 16px; padding: 16px;
    }
    .menu-icon {
      width: 44px; height: 44px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .menu-info { flex: 1; }
    .menu-title { font-size: 16px; font-weight: 700; color: var(--dk-text1); margin-bottom: 2px; }
    .menu-desc { font-size: 12px; color: var(--dk-text2); }
    .menu-arrow { font-size: 20px; color: var(--dk-text3); }

    /* SOS FAB */
    .sos-fab {
      position: absolute; bottom: 92px; right: 16px;
      width: 52px; height: 52px;
      background: linear-gradient(135deg, #DC2626, #EF4444);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 0 4px 16px rgba(220,38,38,0.4);
      z-index: 15;
    }

    /* 탭바 */
    .tab-bar {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 84px;
      background: rgba(13,9,0,0.92);
      backdrop-filter: blur(20px);
      border-top: 0.5px solid rgba(255,255,255,0.06);
      display: flex; justify-content: space-around; align-items: flex-start;
      padding-top: 8px;
    }
    .tab-item {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      font-size: 10px; font-weight: 500; color: rgba(255,255,255,0.3);
      min-width: 70px;
    }
    .tab-item.active { color: var(--dk-primary); }
    .tab-icon { font-size: 22px; }

    .home-ind {
      position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
      width: 134px; height: 5px;
      background: white; border-radius: 999px; opacity: 0.15;
    }
  </style>
</head>
<body>
<div class="phone">
  <div class="scroll">

    <div class="sbar">
      <span class="sbar-time">9:41</span>
      <div class="sbar-icons">
        <svg width="17" height="12" fill="none"><rect x="0" y="3" width="3" height="9" rx="1" fill="white" opacity=".6"/><rect x="4.5" y="2" width="3" height="10" rx="1" fill="white" opacity=".6"/><rect x="9" y="0" width="3" height="12" rx="1" fill="white" opacity=".6"/><rect x="13.5" y="0" width="3" height="12" rx="1" fill="white" opacity=".2"/></svg>
        <svg width="16" height="12" fill="none"><path d="M8 2.4A7.5 7.5 0 0 1 14.5 5l1.2-1.2A9.5 9.5 0 0 0 8 0a9.5 9.5 0 0 0-7.7 3.8L1.5 5A7.5 7.5 0 0 1 8 2.4z" fill="white" opacity=".6"/><circle cx="8" cy="11" r="1.5" fill="white" opacity=".6"/></svg>
        <svg width="27" height="12" fill="none"><rect x="0" y="1" width="22" height="10" rx="2" stroke="white" stroke-opacity=".3"/><rect x="1.5" y="2.5" width="17" height="7" rx="1" fill="white" opacity=".6"/></svg>
      </div>
    </div>

    <!-- 히어로 -->
    <div class="hero">
      <div class="hero-greeting">4월 7일 월요일 · 좋은 아침이에요</div>
      <div class="hero-name">안녕하세요,<br><span>정희</span>님 ☀️</div>

      <div class="daily-card">
        <div class="daily-top">
          <span class="daily-badge">☀️ 오늘의 일과</span>
          <span class="daily-date">4월 7일</span>
        </div>
        <div class="daily-center">
          <div class="ring-wrap">
            <svg width="80" height="80" viewBox="0 0 80 80">
              <circle cx="40" cy="40" r="33" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="7"/>
              <circle cx="40" cy="40" r="33" fill="none" stroke="#FB923C" stroke-width="7"
                stroke-dasharray="207" stroke-dashoffset="124" stroke-linecap="round"/>
            </svg>
            <div class="ring-label">
              <span class="ring-main">2/5</span>
              <span class="ring-sub">완료</span>
            </div>
          </div>
          <div class="daily-info">
            <div class="daily-title">일과 2/5 완료</div>
            <div class="daily-next">다음: 오후 2시 산책</div>
          </div>
        </div>
      </div>
    </div>

    <div class="content">

      <!-- 투약 카드 -->
      <div class="med-card">
        <div class="med-top">
          <div class="med-icon">💊</div>
          <div>
            <div class="med-title">점심 약 드실 시간이에요</div>
            <div class="med-sub">소화제 등 2알 · 12:30</div>
          </div>
        </div>
        <div class="med-progress-row">
          <div class="med-progress-bar"><div class="med-progress-fill"></div></div>
          <span class="med-count">1/3 완료</span>
        </div>
        <div class="med-btn">✅ 네, 다 먹었어요!</div>
      </div>

      <!-- 메뉴 카드 -->
      <div class="menu-grid">
        <div class="menu-card">
          <div class="menu-icon" style="background:rgba(251,146,60,0.12);">📋</div>
          <div class="menu-info">
            <div class="menu-title">오늘 일과표</div>
            <div class="menu-desc">다음: 오후 2시 산책</div>
          </div>
          <span class="menu-arrow">›</span>
        </div>
        <div class="menu-card">
          <div class="menu-icon" style="background:rgba(52,211,153,0.1);">👨‍👩‍👧</div>
          <div class="menu-info">
            <div class="menu-title">가족 소식</div>
            <div class="menu-desc">예찬님이 메시지를 보냈어요</div>
          </div>
          <span class="menu-arrow">›</span>
        </div>
        <div class="menu-card">
          <div class="menu-icon" style="background:rgba(248,113,113,0.1);">🙋</div>
          <div class="menu-info">
            <div class="menu-title">도움 요청</div>
            <div class="menu-desc">물, 담요, 통증 알림</div>
          </div>
          <span class="menu-arrow">›</span>
        </div>
      </div>

    </div>
  </div>

  <!-- SOS -->
  <div class="sos-fab">🔔</div>

  <div class="tab-bar">
    <div class="tab-item active"><span class="tab-icon">🏠</span>홈</div>
    <div class="tab-item"><span class="tab-icon">👨‍👩‍👧</span>가족</div>
    <div class="tab-item"><span class="tab-icon">🙋</span>도움</div>
  </div>
  <div class="home-ind"></div>
</div>
</body>
</html>
