<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>다크모드 — 간호사 홈</title>
  <link rel="stylesheet" href="../v6_전체화면/common.css">
  <style>
    body { background: #1C1C1E; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

    :root {
      --dk-bg: #070D0A;
      --dk-surface: #111A14;
      --dk-surface2: #1E2D22;
      --dk-surface3: #2A3D2E;
      --dk-divider: rgba(255,255,255,0.07);
      --dk-text1: #FFFFFF;
      --dk-text2: rgba(255,255,255,0.55);
      --dk-text3: rgba(255,255,255,0.3);
      --dk-primary: #34D399;        /* emerald-400 */
      --dk-primary-glow: rgba(52,211,153,0.18);
    }

    .phone {
      position: relative;
      width: 393px; height: 852px;
      background: var(--dk-bg);
      border-radius: 48px;
      overflow: hidden;
      box-shadow: 0 0 0 4px #000, 0 24px 64px rgba(0,0,0,0.6);
    }
    .phone::before {
      content: '';
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      width: 126px; height: 36px;
      background: #000; border-radius: 20px; z-index: 20;
    }

    .scroll {
      height: calc(852px - 84px);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 20px;
    }
    .scroll::-webkit-scrollbar { display: none; }

    .sbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 24px 0; height: 54px;
      font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.7);
      position: sticky; top: 0; z-index: 10;
      background: linear-gradient(180deg, var(--dk-bg) 60%, transparent);
    }
    .sbar-time { font-size: 15px; font-weight: 700; color: white; }
    .sbar-icons { display: flex; gap: 5px; }

    /* 히어로 */
    .hero {
      padding: 12px 24px 24px;
      position: relative; overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -80px; right: -60px;
      width: 280px; height: 280px;
      background: radial-gradient(circle, rgba(52,211,153,0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-greeting { font-size: 13px; color: var(--dk-text2); margin-bottom: 3px; font-weight: 500; }
    .hero-name {
      font-size: 24px; font-weight: 700; color: var(--dk-text1);
      margin-bottom: 20px; line-height: 1.2;
    }
    .hero-name span { color: var(--dk-primary); }

    /* 요약 카드 */
    .summary-card {
      background: var(--dk-surface);
      border-radius: 18px; padding: 18px;
      border: 1px solid var(--dk-divider);
      position: relative; overflow: hidden;
    }
    .summary-card::after {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(52,211,153,0.35), transparent);
    }
    .summary-top {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 14px;
    }
    .summary-label { font-size: 12px; color: var(--dk-text3); font-weight: 600; }

    /* 큰 숫자 */
    .big-count {
      display: flex; align-items: baseline; gap: 6px;
      margin-bottom: 12px;
    }
    .big-num { font-size: 48px; font-weight: 800; color: var(--dk-text1); line-height: 1; letter-spacing: -2px; }
    .big-denom { font-size: 24px; font-weight: 500; color: var(--dk-text3); }
    .big-label { font-size: 13px; color: var(--dk-text2); margin-left: 4px; }

    /* 진행 바 */
    .progress-bar {
      height: 6px; background: var(--dk-surface3);
      border-radius: 999px; overflow: hidden; margin-bottom: 12px;
    }
    .progress-fill {
      height: 100%; border-radius: 999px;
      background: linear-gradient(90deg, var(--dk-primary), #6EE7B7);
    }

    /* 상태 뱃지 */
    .status-pills { display: flex; gap: 6px; }
    .status-pill {
      padding: 4px 10px; border-radius: 7px;
      font-size: 11px; font-weight: 600;
    }
    .pill-done { background: rgba(52,211,153,0.12); color: var(--dk-primary); }
    .pill-doing { background: rgba(251,191,36,0.12); color: #FBB F24; color: #FCD34D; }
    .pill-undone { background: rgba(248,113,113,0.12); color: #FCA5A5; }

    /* 컨텐츠 */
    .content { padding: 0 16px; }
    .section { margin-bottom: 16px; }
    .section-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 10px; padding: 0 2px;
    }
    .section-title { font-size: 16px; font-weight: 700; color: var(--dk-text1); }
    .section-more { font-size: 12px; color: var(--dk-primary); font-weight: 600; }

    /* 업무 카드 */
    .task-list {
      display: flex; flex-direction: column; gap: 8px;
    }
    .task-card {
      background: var(--dk-surface);
      border: 1px solid var(--dk-divider);
      border-radius: 14px; padding: 14px;
      display: flex; align-items: center; gap: 12px;
    }
    .task-icon {
      width: 36px; height: 36px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; flex-shrink: 0;
    }
    .task-info { flex: 1; }
    .task-name { font-size: 14px; font-weight: 600; color: var(--dk-text1); margin-bottom: 3px; }
    .task-count { font-size: 11px; color: var(--dk-text3); }
    .task-pct {
      font-size: 16px; font-weight: 700;
    }
    .task-mini-bar {
      width: 48px; height: 3px; background: var(--dk-surface3);
      border-radius: 999px; overflow: hidden; margin-top: 4px;
    }
    .task-mini-fill { height: 100%; border-radius: 999px; }

    /* 알림 환자 */
    .alert-list { display: flex; flex-direction: column; gap: 8px; }
    .alert-patient {
      display: flex; align-items: center; gap: 10px;
      background: var(--dk-surface);
      border: 1px solid var(--dk-divider);
      border-radius: 14px; padding: 12px 14px;
    }
    .ap-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; flex-shrink: 0;
      color: white;
    }
    .ap-info { flex: 1; }
    .ap-name { font-size: 13px; font-weight: 600; color: var(--dk-text1); }
    .ap-detail { font-size: 11px; color: var(--dk-text3); margin-top: 1px; }
    .ap-badge {
      padding: 3px 8px; border-radius: 6px;
      font-size: 10px; font-weight: 700;
    }
    .badge-critical { background: rgba(248,113,113,0.15); color: #F87171; }
    .badge-warn { background: rgba(252,211,77,0.15); color: #FCD34D; }

    /* SOS FAB */
    .sos-fab {
      position: absolute; bottom: 92px; right: 16px;
      width: 52px; height: 52px;
      background: linear-gradient(135deg, #DC2626, #EF4444);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 0 4px 16px rgba(220,38,38,0.4);
      z-index: 15;
    }

    /* 탭바 */
    .tab-bar {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 84px;
      background: rgba(7,13,10,0.92);
      backdrop-filter: blur(20px);
      border-top: 0.5px solid rgba(255,255,255,0.06);
      display: flex; justify-content: space-around; align-items: flex-start;
      padding-top: 8px;
    }
    .tab-item {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      font-size: 10px; font-weight: 500; color: rgba(255,255,255,0.3);
      min-width: 56px;
    }
    .tab-item.active { color: var(--dk-primary); }
    .tab-icon { font-size: 20px; }

    .home-ind {
      position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
      width: 134px; height: 5px;
      background: white; border-radius: 999px; opacity: 0.15;
    }
  </style>
</head>
<body>
<div class="phone">
  <div class="scroll">

    <div class="sbar">
      <span class="sbar-time">9:41</span>
      <div class="sbar-icons">
        <svg width="17" height="12" fill="none"><rect x="0" y="3" width="3" height="9" rx="1" fill="white" opacity=".6"/><rect x="4.5" y="2" width="3" height="10" rx="1" fill="white" opacity=".6"/><rect x="9" y="0" width="3" height="12" rx="1" fill="white" opacity=".6"/><rect x="13.5" y="0" width="3" height="12" rx="1" fill="white" opacity=".2"/></svg>
        <svg width="16" height="12" fill="none"><path d="M8 2.4A7.5 7.5 0 0 1 14.5 5l1.2-1.2A9.5 9.5 0 0 0 8 0a9.5 9.5 0 0 0-7.7 3.8L1.5 5A7.5 7.5 0 0 1 8 2.4z" fill="white" opacity=".6"/><circle cx="8" cy="11" r="1.5" fill="white" opacity=".6"/></svg>
        <svg width="27" height="12" fill="none"><rect x="0" y="1" width="22" height="10" rx="2" stroke="white" stroke-opacity=".3"/><rect x="1.5" y="2.5" width="17" height="7" rx="1" fill="white" opacity=".6"/></svg>
      </div>
    </div>

    <!-- 히어로 -->
    <div class="hero">
      <div class="hero-greeting">4월 7일 월요일 · 오전 근무</div>
      <div class="hero-name">좋은 아침,<br><span>김미영</span> 간호사님</div>

      <div class="summary-card">
        <div class="summary-top">
          <span class="summary-label">오늘의 케어 현황</span>
        </div>
        <div class="big-count">
          <span class="big-num">11</span>
          <span class="big-denom">/ 15</span>
          <span class="big-label">건 완료</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="width: 73%;"></div>
        </div>
        <div class="status-pills">
          <span class="status-pill pill-done">완료 11</span>
          <span class="status-pill pill-doing">진행 2</span>
          <span class="status-pill pill-undone">미완 2</span>
        </div>
      </div>
    </div>

    <div class="content">

      <!-- 업무별 현황 -->
      <div class="section">
        <div class="section-header">
          <span class="section-title">업무별 현황</span>
          <span class="section-more">전체보기</span>
        </div>
        <div class="task-list">
          <div class="task-card">
            <div class="task-icon" style="background:rgba(34,211,238,0.1);">💊</div>
            <div class="task-info">
              <div class="task-name">투약 관리</div>
              <div class="task-count">15명 중 15명</div>
              <div class="task-mini-bar"><div class="task-mini-fill" style="width:100%;background:#22D3EE;"></div></div>
            </div>
            <span class="task-pct" style="color:#34D399;">100%</span>
          </div>
          <div class="task-card">
            <div class="task-icon" style="background:rgba(52,211,153,0.1);">🍽</div>
            <div class="task-info">
              <div class="task-name">식사 보조</div>
              <div class="task-count">15명 중 12명</div>
              <div class="task-mini-bar"><div class="task-mini-fill" style="width:80%;background:#34D399;"></div></div>
            </div>
            <span class="task-pct" style="color:#34D399;">80%</span>
          </div>
          <div class="task-card">
            <div class="task-icon" style="background:rgba(252,211,77,0.1);">🩺</div>
            <div class="task-info">
              <div class="task-name">바이탈 체크</div>
              <div class="task-count">15명 중 10명</div>
              <div class="task-mini-bar"><div class="task-mini-fill" style="width:67%;background:#FCD34D;"></div></div>
            </div>
            <span class="task-pct" style="color:#FCD34D;">67%</span>
          </div>
          <div class="task-card">
            <div class="task-icon" style="background:rgba(248,113,113,0.1);">🧼</div>
            <div class="task-info">
              <div class="task-name">위생 케어</div>
              <div class="task-count">15명 중 8명</div>
              <div class="task-mini-bar"><div class="task-mini-fill" style="width:50%;background:#F87171;"></div></div>
            </div>
            <span class="task-pct" style="color:#F87171;">50%</span>
          </div>
        </div>
      </div>

      <!-- 주의 환자 -->
      <div class="section">
        <div class="section-header">
          <span class="section-title">주의 환자</span>
        </div>
        <div class="alert-list">
          <div class="alert-patient">
            <div class="ap-avatar" style="background:linear-gradient(135deg,#DC2626,#EF4444);">이</div>
            <div class="ap-info">
              <div class="ap-name">이순자님 · 301호</div>
              <div class="ap-detail">체온 37.8°C · 10분 전</div>
            </div>
            <span class="ap-badge badge-critical">경고</span>
          </div>
          <div class="alert-patient">
            <div class="ap-avatar" style="background:linear-gradient(135deg,#D97706,#F59E0B);">박</div>
            <div class="ap-info">
              <div class="ap-name">박영수님 · 304호</div>
              <div class="ap-detail">혈압 145/90 · 30분 전</div>
            </div>
            <span class="ap-badge badge-warn">주의</span>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- SOS -->
  <div class="sos-fab">🆘</div>

  <div class="tab-bar">
    <div class="tab-item active"><span class="tab-icon">🏠</span>홈</div>
    <div class="tab-item"><span class="tab-icon">👥</span>환자</div>
    <div class="tab-item"><span class="tab-icon">✅</span>체크리스트</div>
    <div class="tab-item"><span class="tab-icon">👤</span>내정보</div>
  </div>
  <div class="home-ind"></div>
</div>
</body>
</html>
