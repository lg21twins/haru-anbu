<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box}body{width:1920px;height:1080px;background:#fff;font-family:'Pretendard',-apple-system,sans-serif;position:relative;overflow:hidden}
.header{position:absolute;top:40px;left:60px;font-size:16px;color:#8C939A}.page{position:absolute;bottom:40px;right:60px;font-size:16px;color:#8C939A}
.bubble-l{background:#F5F5F5;border-radius:4px 16px 16px 16px;padding:14px 18px;max-width:380px;margin-bottom:6px}
.bubble-r{background:#4ABAEB;color:#fff;border-radius:16px 4px 16px 16px;padding:14px 18px;max-width:380px;margin-bottom:6px;margin-left:auto}
.time{font-size:13px;color:#B0B0B0;margin-top:4px}
.time-r{font-size:13px;color:rgba(255,255,255,0.6);margin-top:4px;text-align:right}
</style><script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script></head><body>
<div class="header">디지털콘텐츠제작03</div><div class="page">11 / 19</div>
<div style="position:absolute;top:80px;left:100px">
<span style="font-size:52px;font-weight:800;color:#4ABAEB">1:1 </span><span style="font-size:52px;font-weight:800;color:#1E2A3A">채팅</span>
<div style="font-size:20px;color:#8C939A;margin-top:10px">보호자-의료진 실시간 소통 + 사진 첨부</div>
</div>
<div style="position:absolute;top:220px;left:50%;transform:translateX(-50%);width:700px;border:1px solid #E0E0E0;border-radius:24px;overflow:hidden">
<div style="background:#F5F5F5;padding:18px 24px;font-size:15px;font-weight:700;color:#1E2A3A">김간호사 · 담당 간호사 · 101호</div>
<div style="padding:24px;display:flex;flex-direction:column;gap:8px">
<div><div class="bubble-l"><div style="font-size:20px;color:#1E2A3A">오늘 어머님 컨디션이 좋아지셨어요.</div></div><div class="time">10:30</div></div>
<div style="display:flex;flex-direction:column;align-items:flex-end"><div class="bubble-r"><div style="font-size:13px">감사합니다. 식사는 잘 하셨나요?</div></div><div class="time-r" style="color:#B0B0B0">10:32</div></div>
<div><div class="bubble-l"><div style="font-size:20px;color:#1E2A3A">아침 80% 드셨고 투약도 완료했습니다.</div></div><div class="time">10:33</div></div>
<div style="display:flex;flex-direction:column;align-items:flex-end"><div class="bubble-r"><div style="font-size:13px">재활운동은 오늘도 하시나요?</div></div><div class="time-r" style="color:#B0B0B0">10:35</div></div>
<div><div class="bubble-l"><div style="font-size:20px;color:#1E2A3A">네, 10시에 30분간 진행 예정입니다!</div></div><div class="time">10:35</div></div>
</div>
<div style="border-top:1px solid #E0E0E0;padding:14px 24px;display:flex;align-items:center;gap:12px">
<div style="flex:1;background:#F5F5F5;border-radius:24px;padding:12px 20px;font-size:13px;color:#C0C0C0">메시지를 입력하세요...</div>
<div style="width:40px;height:40px;border-radius:50%;background:#4ABAEB;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px">→</div>
</div>
</div>
</body></html>
